# NetworkPolicy for Auth9 namespace
# Restricts traffic between components to minimize attack surface.
#
# Traffic flow:
#   ingress → auth9-portal → auth9-core → tidb, redis, keycloak
#                                        ← keycloak (callback)

---
# auth9-core: accepts traffic from auth9-portal and keycloak only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth9-core
  namespace: auth9
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth9-core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth9-portal
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 50051
  egress:
    # TiDB
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: tidb
      ports:
        - protocol: TCP
          port: 4000
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Keycloak
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# auth9-portal: accepts traffic from ingress controller only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth9-portal
  namespace: auth9
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth9-portal
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # auth9-core
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth9-core
      ports:
        - protocol: TCP
          port: 8080
    # Keycloak (for OIDC redirect flows via BFF)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Keycloak: accepts traffic from auth9-core and auth9-portal
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak
  namespace: auth9
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth9-core
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth9-portal
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # PostgreSQL (Keycloak DB)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Redis: accepts traffic from auth9-core only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: auth9
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: auth9-core
      ports:
        - protocol: TCP
          port: 6379
